<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav-bar">
    <a href="index.html">Homepage</a>
  </nav>

  <!-- Contact Section -->
  <section id="contact">
    <div class="contact-card">

      <h1>Contact Me</h1>
      <p class="intro-text">
        Have a question or want to get in touch? Send me a message below.
      </p>

      <div class="contact-info">
        <p><strong>Email:</strong> waxwell01@gmail.com</p>
        <p><strong>Phone:</strong> 07033444515</p>
        <p><strong>Address:</strong> 22 Driffters Way, South Town Road, Great Yarmouth</p>
      </div>

      <h2>Message Us</h2>

      <form class="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Enter your name"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Your Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your email"
            required
          >
        </div>

        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea 
            id="message" 
            name="message" 
            rows="6" 
            placeholder="Type your message here..."
            required
          ></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>

    </div>
  </section>

</body>
</html>
