<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olatunde</title>
    <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f7fb;
  color: #222;
}


.speaker-card {
  background-color: white;
  width: 250px;
  padding: 25px;
  padding: 15px;
    margin-top: 50px;
    margin-bottom: 50px;
    margin-right: auto;
    margin-left: auto;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;

}

.speaker-card img {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 25%;
}

.speaker-card h1 {
  font-size: 22px;
  margin: 15px 0;
}
.speaker-card p{
  font-size: 18px;
  max-width: 700px;
  margin: 10px auto;
}

    </style>
</head>
<body>
    <div class="speaker-card">
    <img src="mydaddy.jpg" alt="Mr Olatunde">
    <h1>Mr Olatunde</h1>
    <p>born:August 5th 1984</p>
    <p>place of birth:Nigera,ede</p>
    <p>degree:BSE</p>
    </div>
</body>
</html>
